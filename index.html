<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
</head>

<body>
  <script type="module">
    import Cl_vRegistro from "./dist/views/Cl_vRegistro.js";
    import Cl_vPersona from "./dist/views/Cl_vPersona.js";
    import Cl_cPersona from "./dist/controllers/Cl_cPersona.js";
    import Cl_cRegistro from "./dist/controllers/Cl_cRegistro.js";

    const vRegistro = new Cl_vRegistro();
    const vPersona = new Cl_vPersona();
    const cPersona = new Cl_cPersona(vPersona);
    const cRegistro = new Cl_cRegistro(vRegistro, cPersona);
  </script>

  <section id="body">
    <div>
      <h2>Gestión de Registro</h2>
      <div id="salida"></div>

      <div>
        <p><strong>Última persona:</strong></p>
        <p>Nombre: <span id="body_lblNombre">---</span></p>
        <p>Sexo: <span id="body_lblSexo">---</span></p>
        <p>Edad: <span id="body_lblEdad">---</span></p>
      </div>

      <button type="button" id="body_btNuevaPersona">
        Nueva persona
      </button>
    </div>
  </section>

  <hr>

  <section id="persona" hidden>
    <div>
      <h5>Procesar Persona</h5>

      <div>
        <label>Nombre:
          <input type="text" id="persona_inNombre" placeholder="Ej: Juan">
        </label>
      </div>
      <div>
        <label>Sexo:
          <select id="persona_inSexo">
            <option value="f">Femenino</option>
            <option value="m">Masculino</option>
          </select>
        </label>
      </div>

      <div>
        <label>Edad:
          <input type="number" id="persona_inEdad" placeholder="Ej: 25">
        </label>
      </div>

      <div>
        <button id="persona_btCancelar">Cancelar</button>
        <button id="persona_btAceptar">Aceptar</button>
      </div>
    </div>
  </section>

</body>

</html>
