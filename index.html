<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
</head>

<body>

  <section id="body">
    <div class="container mt-5">
      <h2>Gestión de Registro</h2>
      <div class="mb-3">
        <strong>Persona Ingresada:</strong><br>
        Nombre: <span id="body_lblNombre"></span><br>
        Sexo: <span id="body_lblSexo"></span><br>
        Edad: <span id="body_lblEdad"></span><br>
      </div>
      <div id="salida" class="mb-3"></div>
      <button type="button" class="btn btn-primary" id="body_btNuevaPersona">
        Nueva persona
      </button>
  </section>
        <hr>

  <section id="persona" hidden>
    <div>
      <h5 id="persona_lblPersona">Procesar Persona</h5>
    </div>
    <div>
      <label>Nombre:
        <input type="text" class="form-control" id="persona_inNombre" placeholder="Ej: Juan">
      </label>
    </div>
    <div>
      <label>Sexo:
        <select class="form-control" id="persona_inSexo">
          <option value="M">Femenino</option>
          <option value="H">Masculino</option>
        </select>
      </label>
    </div>
    <div>
      <label>Edad:
        <input type="number" class="form-control" id="persona_inEdad" placeholder="Ej: 25">
      </label>
    </div>
    <div>
      <button id="persona_btCancelar">Cancelar</button>
      <button id="persona_btAceptar">Aceptar</button>
    </div>
  </section>
  <script type="module">
    import cRegistro from "./dist/controllers/Cl_cRegistro.js";
    new cRegistro();
  </script>

</body>

</html>
